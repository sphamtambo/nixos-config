format = """
[в–‘в–’в–“](#a3aed2)\
[ оң‘ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$terraform\
$golang\
$php\
$python\
$cpp\
$r\
$html\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ](fg:#212736 bg:#1d2230)\
$cmd_duration\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
conflicted = "вҡ”пёҸ "
ahead = "рҹҸҺпёҸ рҹ’Ё Г—${count}"
behind = "рҹҗў Г—${count}"
diverged = "рҹ”ұ рҹҸҺпёҸ рҹ’Ё Г—${ahead_count} рҹҗў Г—${behind_count}"
untracked = "рҹӣӨпёҸ  Г—${count}"
stashed = "рҹ“Ұ "
modified = "рҹ“қ Г—${count}"
staged = "рҹ—ғпёҸ  Г—${count}"
renamed = "рҹ“ӣ Г—${count}"
deleted = "рҹ—‘пёҸ  Г—${count}"
style = "bright-white"
format = "$all_status$ahead_behind"

[character]
success_symbol = "[вң”](fg:green)"
error_symbol = "[вңҳ](fg:red)"

[python]
symbol = "оҳҶ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[cpp]
symbol = "оҳқ"  
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[html]
symbol = "оң¶"  
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[r]
symbol = "піҺ"  
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
disabled = false
format = "took [$duration]($style)"

[terraform]
format = '[[ $workspace ($version) ](fg:#a0a9cb bg:#1d2230)]($style) '
